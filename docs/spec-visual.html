<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal AF Solucoes - Especificacao Visual Interativa</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --surface3: #282828;
    --border: #333;
    --border-hover: #555;
    --text: #e8e8e8;
    --text-muted: #888;
    --text-dim: #666;
    --accent: #f97316;
    --accent-dim: #c2410c;
    --accent-bg: rgba(249,115,22,0.08);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.08);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.08);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.08);
    --purple: #a855f7;
    --purple-bg: rgba(168,85,247,0.08);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.08);
    --cyan: #06b6d4;
    --cyan-bg: rgba(6,182,212,0.08);
    --pink: #ec4899;
    --pink-bg: rgba(236,72,153,0.08);
    --line: #2a2a2a;
    --node-radius: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }
  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: #fff;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .subtitle { font-size: 13px; color: var(--text-muted); margin-left: auto; }
  /* Controls */
  .controls {
    padding: 12px 24px;
    display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .controls button {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-muted); font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls .search-box {
    flex: 1; min-width: 200px; padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px;
    outline: none;
  }
  .controls .search-box:focus { border-color: var(--accent); }
  .controls .search-box::placeholder { color: var(--text-dim); }
  /* Tree Container */
  .tree-container {
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  /* Node */
  .tree-node {
    position: relative;
    margin-left: 0;
  }
  .tree-node .children {
    margin-left: 28px;
    border-left: 1px solid var(--line);
    padding-left: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
  }
  .tree-node.collapsed > .children {
    max-height: 0 !important;
    opacity: 0;
    pointer-events: none;
  }
  .tree-node:not(.collapsed) > .children {
    opacity: 1;
  }
  /* Node Header */
  .node-header {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    cursor: pointer;
    position: relative;
    border-radius: var(--node-radius);
    transition: background .15s;
  }
  .node-header:hover { background: var(--surface); }
  .node-header .toggle {
    width: 22px; height: 22px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 14px;
    transition: transform .2s;
    margin-top: 2px;
  }
  .tree-node.collapsed > .node-header .toggle { transform: rotate(-90deg); }
  .tree-node.leaf > .node-header .toggle { visibility: hidden; }
  .node-icon {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; margin-top: 1px;
  }
  .node-label { flex: 1; }
  .node-label .title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
  }
  .node-label .desc {
    font-size: 12px; color: var(--text-muted); line-height: 1.4;
  }
  .node-badge {
    font-size: 10px; padding: 2px 8px;
    border-radius: 10px; font-weight: 600;
    white-space: nowrap; margin-top: 3px; flex-shrink: 0;
  }
  /* Detail Panel */
  .node-detail {
    margin: 4px 0 8px 30px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    display: none;
  }
  .node-detail.open { display: block; }
  .node-detail h4 {
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .05em;
    color: var(--accent); margin: 14px 0 6px 0;
  }
  .node-detail h4:first-child { margin-top: 0; }
  .node-detail ul { padding-left: 18px; }
  .node-detail li { margin: 3px 0; color: var(--text-muted); }
  .node-detail li strong { color: var(--text); }
  .node-detail .tag {
    display: inline-block; padding: 1px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 600;
    margin: 1px 2px;
  }
  .node-detail table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .node-detail th, .node-detail td {
    padding: 6px 10px; text-align: left; font-size: 12px;
    border-bottom: 1px solid var(--line);
  }
  .node-detail th { color: var(--text-muted); font-weight: 600; }
  .node-detail .flow-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; margin: 8px 0;
    font-size: 12px;
  }
  .node-detail .flow-step {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
  }
  .node-detail .flow-arrow { color: var(--accent); font-size: 16px; }
  .node-detail .checklist { list-style: none; padding-left: 4px; }
  .node-detail .checklist li::before {
    content: '☐ '; color: var(--text-dim);
  }
  /* Color variants */
  .c-orange .node-icon { background: var(--accent-bg); color: var(--accent); }
  .c-orange .node-badge { background: var(--accent-bg); color: var(--accent); }
  .c-blue .node-icon { background: var(--blue-bg); color: var(--blue); }
  .c-blue .node-badge { background: var(--blue-bg); color: var(--blue); }
  .c-green .node-icon { background: var(--green-bg); color: var(--green); }
  .c-green .node-badge { background: var(--green-bg); color: var(--green); }
  .c-red .node-icon { background: var(--red-bg); color: var(--red); }
  .c-red .node-badge { background: var(--red-bg); color: var(--red); }
  .c-purple .node-icon { background: var(--purple-bg); color: var(--purple); }
  .c-purple .node-badge { background: var(--purple-bg); color: var(--purple); }
  .c-yellow .node-icon { background: var(--yellow-bg); color: var(--yellow); }
  .c-yellow .node-badge { background: var(--yellow-bg); color: var(--yellow); }
  .c-cyan .node-icon { background: var(--cyan-bg); color: var(--cyan); }
  .c-cyan .node-badge { background: var(--cyan-bg); color: var(--cyan); }
  .c-pink .node-icon { background: var(--pink-bg); color: var(--pink); }
  .c-pink .node-badge { background: var(--pink-bg); color: var(--pink); }
  .c-gray .node-icon { background: var(--surface3); color: var(--text-muted); }
  .c-gray .node-badge { background: var(--surface3); color: var(--text-muted); }
  /* Status badges */
  .status-ok { background: var(--green-bg); color: var(--green); }
  .status-dev { background: var(--yellow-bg); color: var(--yellow); }
  .status-off { background: var(--red-bg); color: var(--red); }
  .status-partial { background: var(--blue-bg); color: var(--blue); }
  /* Highlight search */
  .highlight { background: rgba(249,115,22,0.3); border-radius: 2px; }
  .hidden-by-search { display: none !important; }
  /* Print */
  @media print {
    .header, .controls { position: static; }
    .tree-node.collapsed > .children { max-height: none !important; opacity: 1; pointer-events: auto; }
  }
  /* Responsive */
  @media (max-width: 700px) {
    .tree-container { padding: 12px; }
    .node-detail { margin-left: 8px; padding: 12px; }
  }
  /* Legend */
  .legend {
    padding: 12px 24px;
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-muted);
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
</style>
</head>

<div class="header">
  <div class="header-logo">AF</div>

// ========== RENDER ENGINE ==========
function renderNode(node, depth = 0) {
  const hasChildren = node.children && node.children.length > 0;
  const hasDetail = !!node.detail;
  const isLeaf = !hasChildren;
  const collapsed = depth > 1 ? ' collapsed' : '';
  const leafClass = isLeaf ? ' leaf' : '';

  let html = `<div class="tree-node c-${node.color || 'gray'}${collapsed}${leafClass}" data-depth="${depth}">`;
  html += `<div class="node-header" onclick="toggleNode(this, event)">`;
  html += `<span class="toggle">▼</span>`;
  html += `<div class="node-icon">${node.icon || '•'}</div>`;
  html += `<div class="node-label">`;
  html += `<div class="title">${node.title}</div>`;
  if (node.desc) html += `<div class="desc">${node.desc}</div>`;
  html += `</div>`;
  if (node.badge) html += `<span class="node-badge ${node.badgeClass || ''}">${node.badge}</span>`;
  if (hasDetail) html += `<span class="node-badge" style="background:var(--surface3);color:var(--accent);cursor:pointer;font-size:13px" onclick="event.stopPropagation();toggleDetail(this)" title="Ver detalhes">ℹ</span>`;
  html += `</div>`;

  if (hasDetail) {
    html += `<div class="node-detail">${node.detail}</div>`;
  }

  if (hasChildren) {
    html += `<div class="children">`;
    for (const child of node.children) {
      html += renderNode(child, depth + 1);
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function toggleNode(header, event) {
  const node = header.parentElement;
  if (node.classList.contains('leaf')) return;
  node.classList.toggle('collapsed');
  // Auto-size children
  const children = node.querySelector(':scope > .children');
  if (children && !node.classList.contains('collapsed')) {
    children.style.maxHeight = children.scrollHeight + 'px';
    setTimeout(() => children.style.maxHeight = 'none', 300);
  }
}

function toggleDetail(btn) {
  const detail = btn.closest('.tree-node').querySelector(':scope > .node-detail');
  if (detail) {
    detail.classList.toggle('open');
    // Recalc parent children height
    const parent = detail.closest('.children');
    if (parent) parent.style.maxHeight = 'none';
  }
}

function expandAll() {
  document.querySelectorAll('.tree-node').forEach(n => {
    n.classList.remove('collapsed');
    const c = n.querySelector(':scope > .children');
    if (c) c.style.maxHeight = 'none';
  });
}

function collapseAll() {
  document.querySelectorAll('.tree-node').forEach(n => {
    if (n.dataset.depth > 0) n.classList.add('collapsed');
  });
  document.querySelectorAll('.node-detail').forEach(d => d.classList.remove('open'));
}

function expandLevel(level) {
  document.querySelectorAll('.tree-node').forEach(n => {
    const d = parseInt(n.dataset.depth);
    if (d <= level) {
      n.classList.remove('collapsed');
      const c = n.querySelector(':scope > .children');
      if (c) c.style.maxHeight = 'none';
    } else {
      n.classList.add('collapsed');
    }
  });
}

function searchTree(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.tree-node').forEach(n => {
    n.classList.remove('hidden-by-search');
    n.querySelectorAll('.highlight').forEach(h => {
      h.outerHTML = h.textContent;
    });
  });
  if (!q) return;

  document.querySelectorAll('.tree-node').forEach(n => {
    const title = n.querySelector(':scope > .node-header .title');
    const desc = n.querySelector(':scope > .node-header .desc');
    const detail = n.querySelector(':scope > .node-detail');
    const text = (title?.textContent || '') + ' ' + (desc?.textContent || '') + ' ' + (detail?.textContent || '');
    if (!text.toLowerCase().includes(q)) {
      // Check if any descendant matches
      const descendants = n.querySelectorAll('.tree-node');
      let hasMatch = false;
      descendants.forEach(d => {
        const dt = (d.querySelector(':scope > .node-header .title')?.textContent || '') +
                   (d.querySelector(':scope > .node-header .desc')?.textContent || '') +
                   (d.querySelector(':scope > .node-detail')?.textContent || '');
        if (dt.toLowerCase().includes(q)) hasMatch = true;
      });
      if (!hasMatch) n.classList.add('hidden-by-search');
    } else {
      // Expand ancestors
      let parent = n.parentElement?.closest('.tree-node');
      while (parent) {
        parent.classList.remove('collapsed');
        parent.classList.remove('hidden-by-search');
        const c = parent.querySelector(':scope > .children');
        if (c) c.style.maxHeight = 'none';
        parent = parent.parentElement?.closest('.tree-node');
      }
      n.classList.remove('collapsed');
      const c = n.querySelector(':scope > .children');
      if (c) c.style.maxHeight = 'none';
      // Highlight in title
      if (title && title.textContent.toLowerCase().includes(q)) {
        const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        title.innerHTML = title.textContent.replace(re, '<span class="highlight">$1</span>');
      }
    }
  });
}

// Initial render
document.getElementById('tree').innerHTML = renderNode(DATA);
// Set initial max-height for visible children

  c.style.maxHeight = 'none';
});
